name: Android Google Play Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Install dependencies
      run: flutter pub get

    - name: Decode Keystore
      env:
        ENCODED_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      run: |
        printf "%s" "$ENCODED_KEYSTORE" | tr -d '[:space:]' | base64 --decode > android/app/upload-keystore.jks

    - name: Build App Bundle
      env:
        ANDROID_KEYSTORE_PATH: upload-keystore.jks
        ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      run: flutter build appbundle --release

    - name: Create Service Account JSON file
      run: echo '${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}' > service_account.json

    - name: Upload to Google Play
      uses: r0adkll/upload-google-play@v1
      with:
        serviceAccountJson: service_account.json
        packageName: com.cookedapp.app
        releaseFiles: build/app/outputs/bundle/release/app-release.aab
        track: internal
        status: draft

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-release-aab
        path: build/app/outputs/bundle/release/app-release.aab
