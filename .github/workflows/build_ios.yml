name: Build iOS IPA (Unsigned)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Permet de lancer le build manuellement depuis GitHub

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: cd ios && pod install
        
      - name: Build iOS App (Unsigned)
        run: flutter build ios --release --no-codesign

      - name: Package into IPA
        run: |
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          
          # Fix for Linux Sideloaders (zsign/sideloader-gtk)
          # 1. Remove all existing broken signatures
          rm -rf Payload/Runner.app/_CodeSignature
          rm -rf Payload/Runner.app/Frameworks/*/_CodeSignature
          
          # 2. Create minimal valid plist
          cat << 'EOF' > minimal.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict/>
          </plist>
          EOF
          
          # 3. Inject minimal plist into every framework
          for fw in Payload/Runner.app/Frameworks/*.framework; do
            mkdir -p "$fw/_CodeSignature"
            cp minimal.plist "$fw/_CodeSignature/CodeResources"
          done
          
          # Use standard zip without -y to dereference symlinks into flat files
          zip -qq -r Cooked_iOS_Unsigned.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cooked-ios-ipa
          path: Cooked_iOS_Unsigned.ipa
          retention-days: 7
