name: iOS TestFlight Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    
    steps:
    - uses: actions/checkout@v4

    - name: Select Latest Xcode Version
      run: |
        echo "Recherche des versions de Xcode disponibles..."
        ls -d /Applications/Xcode*.app
        
        # On cherche la version 26. Si pas trouvé, on prend la plus récente
        XCODE_PATH=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | tail -n 1)
        
        if [ -z "$XCODE_PATH" ]; then
          echo "Xcode 26 non trouvé. Recherche de la version la plus haute disponible..."
          XCODE_PATH=$(ls -d /Applications/Xcode*.app | sort -V | tail -n 1)
        fi
        
        echo "✅ Xcode sélectionné : $XCODE_PATH"
        sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
        xcodebuild -version

    - name: Install the Apple certificate and provisioning profile
      env:
        P12_DISTRIBUTION_BASE64: ${{ secrets.P12_DISTRIBUTION_BASE64 }}
        P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
      run: |
        CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
        PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
        KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
        echo -n "$P12_DISTRIBUTION_BASE64" | base64 --decode -o $CERTIFICATE_PATH
        echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PP_PATH
        security create-keychain -p "" $KEYCHAIN_PATH
        security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
        security unlock-keychain -p "" $KEYCHAIN_PATH
        security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
        security list-keychain -d user -s $KEYCHAIN_PATH
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Install dependencies
      run: flutter pub get

    - name: Restore iOS Google Service Info
      env:
        IOS_GOOGLE_SERVICE_INFO_BASE64: ${{ secrets.IOS_GOOGLE_SERVICE_INFO_BASE64 }}
      run: |
        echo "$IOS_GOOGLE_SERVICE_INFO_BASE64" | base64 --decode > ios/Runner/GoogleService-Info.plist

    - name: Build IPA
      run: flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

    - name: Upload to TestFlight
      env:
        API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_KEY_CONTENT }}
      run: |
        IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -n 1)
        if [ -z "$IPA_PATH" ]; then
          echo "Erreur : Aucun fichier .ipa trouvé"
          exit 1
        fi
        CLEAN_KEY_ID=$(echo "$API_KEY_ID" | tr -d '[:space:]')
        CLEAN_ISSUER_ID=$(echo "$API_ISSUER_ID" | tr -d '[:space:]')
        mkdir -p ~/private_keys
        echo "$API_PRIVATE_KEY" | sed 's/\\n/\n/g' > ~/private_keys/AuthKey_$CLEAN_KEY_ID.p8
        chmod 600 ~/private_keys/AuthKey_$CLEAN_KEY_ID.p8
        xcrun altool --upload-app --type ios --file "$IPA_PATH" --apiKey "$CLEAN_KEY_ID" --apiIssuer "$CLEAN_ISSUER_ID"

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: release-ipa
        path: build/ios/ipa/*.ipa
