name: iOS TestFlight Release

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      # 🔍 Sélection automatique du Xcode le plus récent (CRITIQUE)
      - name: Select latest Xcode
        run: |
          echo "Xcode disponibles :"
          ls /Applications | grep Xcode || true

          LATEST_XCODE=$(ls -d /Applications/Xcode*.app | sort -V | tail -n 1)

          if [ -z "$LATEST_XCODE" ]; then
            echo "❌ Aucun Xcode trouvé"
            exit 1
          fi

          echo "✅ Utilisation de $LATEST_XCODE"
          sudo xcode-select -s "$LATEST_XCODE/Contents/Developer"

      # 🔍 Vérification réelle (évite 100% des erreurs Apple)
      - name: Verify Xcode & SDK
        run: |
          xcodebuild -version
          SDK_VERSION=$(xcrun --sdk iphoneos --show-sdk-version)
          echo "SDK utilisé : $SDK_VERSION"

      # 🔐 Certificats Apple
      - name: Install certificates
        env:
          P12_DISTRIBUTION_BASE64: ${{ secrets.P12_DISTRIBUTION_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          CERT_PATH=$RUNNER_TEMP/cert.p12
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          KEYCHAIN=$RUNNER_TEMP/signing.keychain-db

          echo "$P12_DISTRIBUTION_BASE64" | base64 --decode > $CERT_PATH
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > $PP_PATH

          security create-keychain -p "" $KEYCHAIN
          security set-keychain-settings -lut 21600 $KEYCHAIN
          security unlock-keychain -p "" $KEYCHAIN

          security import $CERT_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN
          security list-keychain -d user -s $KEYCHAIN

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      # 🧱 Flutter setup
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # 🧹 Clean total (évite ancien SDK 18.x)
      - name: Clean project
        run: |
          flutter clean
          rm -rf ios/Pods ios/Podfile.lock
          flutter pub get

      # 📦 Build IPA
      - name: Build IPA
        run: flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

      # 🚀 Upload TestFlight
      - name: Upload to TestFlight
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_KEY_CONTENT }}
        run: |
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -n 1)

          if [ -z "$IPA_PATH" ]; then
            echo "❌ Aucun IPA trouvé"
            exit 1
          fi

          echo "IPA trouvé : $IPA_PATH"

          CLEAN_KEY_ID=$(echo "$API_KEY_ID" | tr -d ' ')
          CLEAN_ISSUER_ID=$(echo "$API_ISSUER_ID" | tr -d ' ')

          mkdir -p private_keys

          # 🔑 Reconstruction propre de la clé Apple (CRITIQUE)
          python3 - <<EOF
          import os

          key = os.environ["API_PRIVATE_KEY"]

          # convertir \n → vrais retours ligne
          key = key.replace("\\n", "\n").strip()

          with open(f"private_keys/AuthKey_{os.environ['API_KEY_ID'].strip()}.p8", "w") as f:
              f.write(key + "\n")
          EOF

          chmod 600 private_keys/AuthKey_$CLEAN_KEY_ID.p8

          # 🔍 Vérification rapide
          head -n 2 private_keys/AuthKey_$CLEAN_KEY_ID.p8

          # 🚀 Upload
          xcrun altool \
            --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$CLEAN_KEY_ID" \
            --apiIssuer "$CLEAN_ISSUER_ID"

      # 📁 Artifact
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-ipa
          path: build/ios/ipa/*.ipa