name: iOS TestFlight Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app | sort -V | tail -n 1)
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Install Apple Certificate and Provisioning Profile
        env:
          P12_DISTRIBUTION_BASE64: ${{ secrets.P12_DISTRIBUTION_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/cert.p12
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          KEYCHAIN=$RUNNER_TEMP/app-signing.keychain-db

          echo "$P12_DISTRIBUTION_BASE64" | base64 --decode > $CERTIFICATE_PATH
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > $PP_PATH

          security create-keychain -p "" $KEYCHAIN
          security unlock-keychain -p "" $KEYCHAIN
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -k $KEYCHAIN
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Flutter Dependencies
        run: flutter pub get

      - name: Clean and Re-generate iOS Flutter Files
        run: |
          flutter clean
          flutter pub get   # ⚠️ OBLIGATOIRE after clean

      - name: Verify Generated.xcconfig
        run: |
          if [ ! -f ios/Flutter/Generated.xcconfig ]; then
            echo "❌ Generated.xcconfig NOT FOUND"
            ls ios/Flutter
            exit 1
          fi

      - name: Install CocoaPods
        run: |
          cd ios
          rm -rf Pods Podfile.lock
          pod install

      - name: Build IPA
        run: flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

      - name: Upload to TestFlight
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_KEY_CONTENT }}
        run: |
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -n 1)
          mkdir -p ~/private_keys
          echo "$API_PRIVATE_KEY" | sed 's/\\n/\n/g' > ~/private_keys/AuthKey_$API_KEY_ID.p8
          chmod 600 ~/private_keys/AuthKey_$API_KEY_ID.p8

          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-ipa
          path: build/ios/ipa/*.ipa