name: iOS TestFlight Release

on:
  workflow_dispatch: # Permet de lancer le build manuellement

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Install the Apple certificate and provisioning profile
      env:
        P12_DISTRIBUTION_BASE64: ${{ secrets.P12_DISTRIBUTION_BASE64 }}
        P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
      run: |
        # create variables
        CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
        PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
        KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

        # import certificate and provisioning profile from secrets
        echo -n "$P12_DISTRIBUTION_BASE64" | base64 --decode -o $CERTIFICATE_PATH
        echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PP_PATH

        # create temporary keychain
        security create-keychain -p "" $KEYCHAIN_PATH
        security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
        security unlock-keychain -p "" $KEYCHAIN_PATH

        # import certificate to keychain
        security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
        security list-keychain -d user -s $KEYCHAIN_PATH

        # apply provisioning profile
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Install dependencies
      run: flutter pub get

    - name: Build IPA
      run: flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

    - name: Upload to TestFlight
      env:
        API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_KEY_CONTENT }}
      run: |
        # Trouver le fichier IPA
        IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -n 1)
        if [ -z "$IPA_PATH" ]; then
          echo "Erreur : Aucun fichier .ipa trouvé"
          exit 1
        fi
        echo "IPA : $IPA_PATH"

        # Nettoyer les IDs et les exporter pour Python
        export CLEAN_KEY_ID=$(echo "$API_KEY_ID" | tr -d ' ')
        export CLEAN_ISSUER_ID=$(echo "$API_ISSUER_ID" | tr -d ' ')

        # Créer le dossier
        mkdir -p ~/private_keys
        
        # Utiliser Python pour écrire la clé (version stable une-ligne)
        python3 -c "import os; f=open(os.path.expanduser('~/private_keys/AuthKey_'+os.environ['CLEAN_KEY_ID']+'.p8'), 'w'); f.write(os.environ['API_PRIVATE_KEY']); f.close()"

        chmod 700 ~/private_keys
        chmod 600 ~/private_keys/AuthKey_$CLEAN_KEY_ID.p8

        # Upload direct
        xcrun altool --upload-app --type ios --file "$IPA_PATH" --apiKey "$CLEAN_KEY_ID" --apiIssuer "$CLEAN_ISSUER_ID"

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: release-ipa
        path: build/ios/ipa/*.ipa
