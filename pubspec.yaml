name: cooked
description: "A new Flutter project."
publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  tutorial_coach_mark: ^1.3.3
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.2
  image_picker: ^1.2.1
  share_plus: ^12.0.1
  device_preview: ^1.3.1
  http: ^1.6.0
  shared_preferences: ^2.5.3
  flutter_svg: ^2.2.3
  intl_phone_field: ^3.2.0
  intl: ^0.20.2
  webview_flutter: ^4.10.0
  in_app_purchase: ^3.2.3
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  app_links: ^6.3.3
  flutter_local_notifications: ^18.0.1
  font_awesome_flutter: ^10.9.1
  permission_handler: ^12.0.1
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.1
  flutter_screenutil: ^5.9.3
  camera: ^0.11.2+1
  webview_flutter_android: ^4.10.1
  webview_flutter_wkwebview: ^3.23.0
  timezone: ^0.10.1

dev_dependencies:
  tutorial_coach_mark: ^1.3.3
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.3

flutter_icons:
  android: true
  ios: true
  image_path: "assets/favicon/android.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icones/
    - assets/favicon/

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/images/logo3_padded.png"
  android_12:
    color: "#FFFFFF"
    image: "assets/images/logo3_padded.png"