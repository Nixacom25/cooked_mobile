  intl_phone_field: ^3.2.0
  intl: ^0.20.2
  webview_flutter: ^4.10.0
  in_app_purchase: ^3.2.3
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  flutter_image_compress: ^2.4.0
  firebase_core: ^3.1.1
  firebase_crashlytics: ^4.0.0
  firebase_analytics: ^11.1.1
