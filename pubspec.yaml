name: app_ecommerce
description: "A new Flutter project."
publish_to: 'none' 
version: 1.0.0+1
environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.2
  visibility_detector: ^0.4.0+2
  image_picker: ^1.2.1
  http: ^1.6.0
  cached_network_image: ^3.4.1
  device_preview: ^1.3.1
  video_player: ^2.10.1
  flutter_cache_manager: ^3.4.1
  
  # New dependencies for client features
  audioplayers: ^5.2.1              # Audio player for category explanations
  google_maps_flutter: ^2.5.0       # Google Maps for location
  geolocator: ^10.1.0               # User location
  intl: ^0.20.2                     # Date/time formatting
  shared_preferences: ^2.2.2        # Local storage for orders
  share_plus: ^12.0.1
  font_awesome_flutter: ^10.9.1
  record: ^6.2.0
  permission_handler: ^12.0.1
  path_provider: ^2.1.5
  geocoding: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"

flutter:

  uses-material-design: true

  assets:
    - assets/images/

