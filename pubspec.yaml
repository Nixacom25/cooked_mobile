  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.2
  image_picker: ^1.2.1
  share_plus: ^12.0.1
  device_preview: ^1.3.1
  http: ^1.6.0
  shared_preferences: ^2.5.3
